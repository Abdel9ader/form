<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استمارة التغذية - د. عزة توفيق</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="form.css">
</head>
<body>
  <div class="header">
    <div class="container">
      <h1><i class="fas fa-utensils"></i> استمارة التغذية</h1>
      <p>د. عزة توفيق - أخصائية التغذية العلاجية</p>
    </div>
  </div>
  
  <div class="container">
    <div class="form-container">
      <div class="form-decoration">
        <i class="fas fa-leaf"></i>
      </div>
      
      <form id="nutritionForm">
        <div class="form-group">
          <label for="name">الاسم بالكامل:</label>
          <input type="text" id="name" name="name" required placeholder="الاسم الثلاثي">
        </div>
        
        <div class="form-group">
          <label for="age">السن:</label>
          <input type="number" id="age" name="age" required placeholder="بالسنوات" min="10" max="100">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="weight">الوزن (كجم):</label>
            <input type="number" id="weight" name="weight" required placeholder="بالكيلوجرام" step="0.1">
          </div>
          <div class="form-group">
            <label for="height">الطول (سم):</label>
            <input type="number" id="height" name="height" required placeholder="بالسنتيمتر">
          </div>
        </div>
        
        <div class="form-group">
          <label for="exercise">هل تمارس الرياضة؟</label>
          <select id="exercise" name="exercise" required>
            <option value="" disabled selected>اختر الإجابة</option>
            <option value="نعم">نعم</option>
            <option value="لا">لا</option>
            <option value="أحياناً">أحياناً</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="diseases">هل تعاني من أي أمراض أو حالات صحية؟</label>
          <textarea id="diseases" name="diseases" placeholder="يرجى ذكر أي أمراض أو أدوية تتناولها"></textarea>
        </div>
        
        <div class="form-group">
          <label for="dailyFood">نظام الأكل اليومي:</label>
          <textarea id="dailyFood" name="dailyFood" placeholder="صف نظامك الغذائي المعتاد"></textarea>
        </div>
        
        <div class="form-group">
          <label for="sleep">نظام النوم (عدد الساعات):</label>
          <input type="text" id="sleep" name="sleep" placeholder="مثال: 6-8 ساعات">
        </div>
        
        <div class="form-group">
          <label for="goal">الهدف من الاستشارة:</label>
          <select id="goal" name="goal" required>
            <option value="" disabled selected>اختر هدفك</option>
            <option value="زيادة">زيادة الوزن</option>
            <option value="نقصان">نقصان الوزن</option>
            <option value="تثبيت">تثبيت الوزن</option>
            <option value="صحة">تحسين الصحة العامة</option>
          </select>
        </div>
        
        <button type="submit" class="btn-submit">
          <i class="fas fa-paper-plane"></i> إرسال البيانات
        </button>
      </form>
      
      <div id="successMessage" class="success-message">
        <i class="fas fa-check-circle"></i> تم حفظ البيانات بنجاح
      </div>
    </div>
  </div>

  <script src="form.js"></script>
</body>
</html>
